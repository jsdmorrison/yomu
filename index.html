function getVocab(w){
const v=VOCAB[w]; if(!v) return null;
const i=v.indexOf(”|”);
return {reading:v.slice(0,i),meaning:v.slice(i+1)};
}

function tokenise(text){
const keys=Object.keys(VOCAB).sort((a,b)=>b.length-a.length);
const tokens=[]; let i=0;
while(i<text.length){
if(”\n\u3002\u3001\uff01\uff1f”.includes(text[i])){tokens.push({type:“punct”,text:text[i]});i++;continue;}
let matched=false;
for(const k of keys){
if(k.length>1&&text.startsWith(k,i)){
tokens.push({type:“word”,text:k,vocab:getVocab(k)});i+=k.length;matched=true;break;
}
}
if(!matched){
const last=tokens[tokens.length-1];
if(last&&last.type===“char”){last.text+=text[i];}
else{tokens.push({type:“char”,text:text[i]});}
i++;
}
}
return tokens;
}

function GlossCard({token,onClose}){
if(!token?.vocab)return null;
return(
<div onClick={onClose} style={{position:“fixed”,bottom:28,left:“50%”,transform:“translateX(-50%)”,background:”#0f172a”,border:“1px solid #6366f1”,borderRadius:16,padding:“16px 22px”,minWidth:240,maxWidth:320,zIndex:200,boxShadow:“0 24px 64px rgba(0,0,0,.7)”,animation:“glossUp .22s cubic-bezier(.34,1.56,.64,1)”,cursor:“pointer”}}>
<div style={{display:“flex”,alignItems:“flex-start”,justifyContent:“space-between”,gap:12}}>
<div>
<div style={{display:“flex”,alignItems:“baseline”,gap:10,marginBottom:5}}>
<span style={{fontSize:30,color:”#f1f5f9”,fontFamily:“Noto Serif JP,serif”}}>{token.text}</span>
<span style={{fontSize:14,color:”#94a3b8”}}>{token.vocab.reading}</span>
</div>
<div style={{fontSize:15,color:”#e2e8f0”,fontWeight:600}}>{token.vocab.meaning}</div>
</div>
<span style={{color:”#334155”,fontSize:18,flexShrink:0}}>x</span>
</div>
</div>
);
}

function VocabSidebar({lexicon,onClose}){
const entries=Object.entries(lexicon).sort((a,b)=>b[1].n-a[1].n);
const col=n=>n>=10?”#4ade80”:n>=4?”#f59e0b”:”#6366f1”;
const status=n=>n>=10?“acquired”:n>=4?“familiar”:“exposed”;
return(
<div style={{position:“fixed”,right:0,top:0,bottom:0,width:300,background:”#080e1a”,borderLeft:“1px solid #1e293b”,display:“flex”,flexDirection:“column”,zIndex:300,animation:“slideRight .28s ease”}}>
<div style={{padding:20,borderBottom:“1px solid #1e293b”,display:“flex”,justifyContent:“space-between”,alignItems:“center”}}>
<div><div style={{fontSize:14,fontWeight:700,color:”#f1f5f9”}}>My Vocabulary</div><div style={{fontSize:11,color:”#475569”,marginTop:2}}>{entries.length} words encountered</div></div>
<button onClick={onClose} style={{background:“none”,border:“none”,color:”#475569”,cursor:“pointer”,fontSize:20}}>x</button>
</div>
<div style={{padding:“10px 16px”,borderBottom:“1px solid #1e293b”,display:“flex”,gap:6}}>
{[[“exposed”,”#6366f1”],[“familiar”,”#f59e0b”],[“acquired”,”#4ade80”]].map(([s,c])=>(
<div key={s} style={{flex:1,textAlign:“center”,padding:“7px 4px”,background:”#0f172a”,borderRadius:8,border:`1px solid ${c}30`}}>
<div style={{fontSize:17,fontWeight:800,color:c}}>{entries.filter(([,v])=>status(v.n)===s).length}</div>
<div style={{fontSize:9,color:”#475569”,textTransform:“uppercase”,letterSpacing:1,marginTop:1}}>{s}</div>
</div>
))}
</div>
<div style={{flex:1,overflowY:“auto”,padding:“6px 14px”}}>
{entries.map(([word,data])=>(
<div key={word} style={{display:“flex”,alignItems:“center”,padding:“8px 0”,borderBottom:“1px solid #0d1524”,gap:10}}>
<div style={{width:6,height:6,borderRadius:“50%”,background:col(data.n),flexShrink:0}}/>
<div style={{flex:1}}>
<div style={{display:“flex”,alignItems:“baseline”,gap:6}}>
<span style={{fontSize:15,color:”#f1f5f9”,fontFamily:“Noto Serif JP,serif”}}>{word}</span>
<span style={{fontSize:11,color:”#64748b”}}>{data.reading}</span>
</div>
<div style={{fontSize:12,color:”#94a3b8”}}>{data.meaning}</div>
</div>
<div style={{fontSize:11,color:col(data.n),fontWeight:700}}>{data.n}x</div>
</div>
))}
</div>
</div>
);
}

function PassageView({unit,passage,passageIndex,lexicon,setLexicon,onComplete,onBack}){
const [selected,setSelected]=useState(null);
const [showFuri,setShowFuri]=useState(true);
const [showGrammar,setShowGrammar]=useState(false);
const [showVocab,setShowVocab]=useState(false);
const [phase,setPhase]=useState(“read”);
const [answers,setAnswers]=useState({});
const [submitted,setSubmitted]=useState(false);
const [score,setScore]=useState(null);
const tokens=tokenise(passage.passage);
React.useEffect(()=>{
const updated={…lexicon};
tokens.forEach(t=>{if(t.type===“word”&&t.vocab){const w=t.text;if(updated[w])updated[w]={…updated[w],n:updated[w].n+1};else updated[w]={reading:t.vocab.reading,meaning:t.vocab.meaning,n:1};}});
passage.newWords.forEach(w=>{if(!updated[w.word])updated[w.word]={reading:w.reading,meaning:w.meaning,n:1};});
setLexicon(updated);
},[]);
const handleSubmit=()=>{const c=passage.questions.filter((q,i)=>answers[i]===q.ans).length;setSubmitted(true);setScore(c);setTimeout(()=>setPhase(“done”),1600);};
const newSet=new Set(passage.newWords.map(w=>w.word));
return(
<div>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”,marginBottom:22}}>
<button onClick={onBack} style={{background:“none”,border:“none”,color:”#475569”,cursor:“pointer”,fontSize:13,padding:0}}>Back</button>
<div style={{display:“flex”,gap:8}}>
<button onClick={()=>setShowFuri(f=>!f)} style={{background:showFuri?”#312e81”:”#1e293b”,border:`1px solid ${showFuri?"#6366f1":"#334155"}`,borderRadius:8,padding:“5px 12px”,color:showFuri?”#a5b4fc”:”#64748b”,fontSize:12,cursor:“pointer”,fontWeight:600}}>ふり仮名</button>
<button onClick={()=>setShowVocab(v=>!v)} style={{background:”#1e293b”,border:“1px solid #334155”,borderRadius:8,padding:“5px 12px”,color:”#64748b”,fontSize:12,cursor:“pointer”}}>Vocab {Object.keys(lexicon).length}</button>
</div>
</div>
<div style={{marginBottom:22}}>
<div style={{fontSize:11,letterSpacing:3,color:”#334155”,textTransform:“uppercase”,marginBottom:7}}>{unit.titleJa} Passage {passageIndex+1}/8</div>
<div style={{fontSize:22,color:”#f1f5f9”,fontFamily:“Noto Serif JP,serif”,marginBottom:2}}>{passage.title}</div>
<div style={{fontSize:13,color:”#64748b”}}>{passage.titleEn}</div>
</div>
{passage.newWords.length>0&&(
<div style={{background:”#0a0f1a”,border:“1px solid #312e81”,borderRadius:12,padding:“12px 16px”,marginBottom:20}}>
<div style={{fontSize:10,letterSpacing:2,color:”#6366f1”,textTransform:“uppercase”,marginBottom:8,fontWeight:700}}>{passage.newWords.length} New Words</div>
<div style={{display:“flex”,flexWrap:“wrap”,gap:6}}>
{passage.newWords.map((w,i)=>(
<div key={i} style={{background:”#1e1b4b”,border:“1px solid #4f46e5”,borderRadius:6,padding:“4px 10px”,fontSize:13}}>
<span style={{color:”#a5b4fc”,fontFamily:“Noto Serif JP,serif”}}>{w.word}</span>
<span style={{color:”#475569”,fontSize:11,marginLeft:6}}>{w.meaning}</span>
</div>
))}
</div>
</div>
)}
{phase===“read”&&(
<>
<div style={{background:“linear-gradient(135deg,#070d1a,#0f172a)”,border:“1px solid #1e293b”,borderRadius:16,padding:“26px 24px 22px”,marginBottom:20,lineHeight:3.2,fontSize:19,fontFamily:“Noto Serif JP,serif”,letterSpacing:”.04em”}}>
{tokens.map((tok,i)=>{
if(tok.type===“punct”)return <span key={i} style={{color:”#334155”}}>{tok.text===”\u3002”?”\u3002 “:tok.text}</span>;
if(tok.type===“char”)return <span key={i} style={{color:”#cbd5e1”}}>{tok.text}</span>;
const isNew=newSet.has(tok.text),isSel=selected?.text===tok.text;
return(
<ruby key={i} onClick={()=>tok.vocab&&setSelected(t=>t?.text===tok.text?null:tok)} style={{cursor:tok.vocab?“pointer”:“default”,display:“inline-flex”,flexDirection:“column”,alignItems:“center”,margin:“0 1px”,padding:“2px 3px”,borderRadius:4,background:isSel?“rgba(251,191,36,.2)”:isNew?“rgba(99,102,241,.12)”:tok.vocab?“rgba(255,255,255,.02)”:“transparent”,borderBottom:isNew?“2px solid #6366f1”:tok.vocab?“1px solid rgba(255,255,255,.08)”:“none”,transition:“background .12s”,lineHeight:1}}>
<span>{tok.text}</span>
{showFuri&&tok.vocab&&tok.vocab.reading!==tok.text&&<rt style={{fontSize:”.42em”,color:”#64748b”,userSelect:“none”,lineHeight:1.5}}>{tok.vocab.reading}</rt>}
</ruby>
);
})}
</div>
<div style={{marginBottom:20}}>
<button onClick={()=>setShowGrammar(g=>!g)} style={{background:“none”,border:“1px solid #1e3a5f”,borderRadius:8,padding:“7px 14px”,color:”#60a5fa”,fontSize:12,cursor:“pointer”}}>Grammar Note {showGrammar?”(hide)”:”(show)”}</button>
{showGrammar&&<div style={{marginTop:10,background:”#0b1829”,border:“1px solid #1e3a5f”,borderRadius:10,padding:“13px 16px”,fontSize:13,color:”#93c5fd”,lineHeight:1.75}}>{passage.grammarNote}</div>}
</div>
<button onClick={()=>setPhase(“check”)} style={{width:“100%”,background:“linear-gradient(135deg,#4f46e5,#6366f1)”,border:“none”,borderRadius:12,padding:14,color:”#fff”,fontSize:15,fontWeight:700,cursor:“pointer”}}>Check Comprehension</button>
</>
)}
{phase===“check”&&(
<>
<div style={{background:”#070d1a”,border:“1px solid #1e293b”,borderRadius:12,padding:“16px 18px”,marginBottom:20,fontSize:16,fontFamily:“Noto Serif JP,serif”,color:”#64748b”,lineHeight:2.6,opacity:.75}}>{passage.passage}</div>
<div style={{fontSize:11,letterSpacing:3,color:”#475569”,textTransform:“uppercase”,marginBottom:14}}>Comprehension</div>
{passage.questions.map((q,i)=>(
<div key={i} style={{marginBottom:18,background:”#0a0f1a”,borderRadius:12,padding:16,border:“1px solid #1e293b”}}>
<div style={{fontSize:15,color:”#f1f5f9”,marginBottom:3,fontFamily:“Noto Serif JP,serif”}}>{q.q}</div>
<div style={{fontSize:12,color:”#475569”,marginBottom:11}}>{q.qEn}</div>
<div style={{display:“flex”,flexDirection:“column”,gap:7}}>
{q.opts.map((opt,j)=>{
let bg=”#1e293b”,bc=”#334155”,c=”#cbd5e1”;
if(submitted){if(j===q.ans){bg=”#14532d”;bc=”#4ade80”;c=”#4ade80”;}else if(j===answers[i]&&j!==q.ans){bg=”#450a0a”;bc=”#f87171”;c=”#f87171”;}}
else if(answers[i]===j){bc=”#6366f1”;c=”#a5b4fc”;}
return(<button key={j} disabled={submitted} onClick={()=>setAnswers({…answers,[i]:j})} style={{background:bg,border:`1px solid ${bc}`,borderRadius:8,padding:“10px 14px”,color:c,fontSize:14,cursor:submitted?“default”:“pointer”,textAlign:“left”,fontFamily:“Noto Serif JP,serif”,transition:“all .12s”}}>{opt}</button>);
})}
</div>
</div>
))}
{!submitted&&Object.keys(answers).length===passage.questions.length&&<button onClick={handleSubmit} style={{width:“100%”,background:“linear-gradient(135deg,#4f46e5,#6366f1)”,border:“none”,borderRadius:10,padding:12,color:”#fff”,fontSize:14,fontWeight:700,cursor:“pointer”}}>Submit</button>}
</>
)}
{phase===“done”&&(
<div style={{textAlign:“center”,padding:“32px 0”,animation:“fadeUp .35s ease”}}>
<div style={{fontSize:52,marginBottom:10}}>{score===passage.questions.length?”\uD83C\uDF38”:”\u2728”}</div>
<div style={{fontSize:24,fontWeight:800,color:”#f1f5f9”,marginBottom:6}}>{score}/{passage.questions.length} correct</div>
<div style={{fontSize:13,color:”#6366f1”,marginBottom:24}}>+{passage.newWords.length} new words</div>
<button onClick={onComplete} style={{background:“linear-gradient(135deg,#4f46e5,#6366f1)”,border:“none”,borderRadius:12,padding:“14px 36px”,color:”#fff”,fontSize:15,fontWeight:700,cursor:“pointer”}}>{passageIndex<7?“Next Passage”:“Unit Complete!”}</button>
</div>
)}
<GlossCard token={selected} onClose={()=>setSelected(null)}/>
{showVocab&&<VocabSidebar lexicon={lexicon} onClose={()=>setShowVocab(false)}/>}
</div>
);
}

function UnitScreen({unit,progress,onStart,onBack}){
const done=progress[unit.id]||0;
const passages=PASSAGES[unit.id];
return(
<div style={{animation:“fadeUp .3s ease”}}>
<button onClick={onBack} style={{background:“none”,border:“none”,color:”#475569”,cursor:“pointer”,fontSize:13,padding:“0 0 20px”}}>All Units</button>
<div style={{display:“flex”,alignItems:“center”,gap:14,marginBottom:22}}>
<div style={{fontSize:36}}>{unit.icon}</div>
<div><div style={{fontSize:22,fontWeight:800,color:”#f1f5f9”}}>{unit.title}</div><div style={{fontSize:13,color:”#64748b”,fontFamily:“Noto Sans JP,sans-serif”}}>{unit.titleJa}</div></div>
</div>
<div style={{background:”#0a0f1a”,border:“1px solid #1e293b”,borderRadius:12,padding:“14px 18px”,marginBottom:24}}>
<div style={{fontSize:11,letterSpacing:2,color:”#334155”,textTransform:“uppercase”,marginBottom:6}}>Progress</div>
<div style={{height:5,background:”#1e293b”,borderRadius:3,overflow:“hidden”}}><div style={{height:“100%”,width:`${(done/8)*100}%`,background:unit.color,borderRadius:3,transition:“width .5s ease”}}/></div>
<div style={{fontSize:11,color:”#475569”,marginTop:5}}>{done} of 8 passages complete</div>
</div>
<div style={{display:“flex”,flexDirection:“column”,gap:8}}>
{passages.map((p,i)=>{
const isDone=i<done,isCurrent=i===done,isLocked=i>done;
return(
<div key={i} onClick={()=>!isLocked&&onStart(i)} style={{background:isDone?”#070d1a”:“linear-gradient(135deg,#0a0f1a,#0f172a)”,border:`1px solid ${isCurrent?unit.color+"80":"#1e293b"}`,borderRadius:12,padding:“14px 18px”,cursor:isLocked?“not-allowed”:“pointer”,opacity:isLocked?.35:1,display:“flex”,alignItems:“center”,gap:14,transition:“border-color .15s”}}>
<div style={{width:34,height:34,borderRadius:8,background:isDone?”#14532d”:isCurrent?unit.color+“20”:”#0f172a”,border:`1px solid ${isDone?"#4ade80":isCurrent?unit.color:"#334155"}`,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:14,color:isDone?”#4ade80”:isCurrent?unit.color:”#334155”,flexShrink:0}}>{isDone?“v”:i+1}</div>
<div style={{flex:1}}>
<div style={{fontSize:14,color:isLocked?”#334155”:isDone?”#64748b”:”#f1f5f9”,fontFamily:“Noto Serif JP,serif”,fontWeight:isDone?400:600}}>{p.title}</div>
<div style={{fontSize:11,color:”#334155”,marginTop:2}}>{p.titleEn} - {p.newWords.length} new words</div>
</div>
{!isLocked&&!isDone&&<span style={{color:unit.color,fontSize:16}}>go</span>}
</div>
);
})}
</div>
</div>
);
}

function Dashboard({progress,lexiconSize,wordsRead,onSelect,onShowVocab}){
const totalPassages=UNITS.reduce((a,u)=>(progress[u.id]||0)+a,0);
const pct=Math.min(100,Math.round((wordsRead/3000)*100));
return(
<div style={{animation:“fadeUp .35s ease”}}>
<div style={{background:”#0a0f1a”,border:“1px solid #1e293b”,borderRadius:14,padding:“18px 20px”,marginBottom:26}}>
<div style={{display:“flex”,gap:18,marginBottom:14}}>
<div style={{flex:1}}><div style={{fontSize:10,letterSpacing:2,color:”#334155”,textTransform:“uppercase”,marginBottom:4}}>Words Read</div><div style={{fontSize:26,fontWeight:900,color:”#f1f5f9”}}>{wordsRead.toLocaleString()}</div></div>
<div style={{textAlign:“center”}}><div style={{fontSize:10,letterSpacing:2,color:”#334155”,textTransform:“uppercase”,marginBottom:4}}>Vocab</div><div style={{fontSize:26,fontWeight:900,color:”#818cf8”}}>{lexiconSize}</div><button onClick={onShowVocab} style={{marginTop:2,background:“none”,border:“1px solid #312e81”,borderRadius:5,padding:“2px 8px”,color:”#6366f1”,fontSize:10,cursor:“pointer”}}>view</button></div>
<div style={{textAlign:“center”}}><div style={{fontSize:10,letterSpacing:2,color:”#334155”,textTransform:“uppercase”,marginBottom:4}}>Passages</div><div style={{fontSize:26,fontWeight:900,color:”#4ade80”}}>{totalPassages}</div><div style={{fontSize:9,color:”#334155”,marginTop:2}}>of 48</div></div>
</div>
<div style={{height:4,background:”#1e293b”,borderRadius:2,overflow:“hidden”}}><div style={{height:“100%”,width:`${pct}%`,background:“linear-gradient(90deg,#4f46e5,#818cf8)”,borderRadius:2,transition:“width .6s”}}/></div>
<div style={{fontSize:10,color:”#334155”,marginTop:5}}>{wordsRead} / 3000 words to complete N5</div>
</div>
<div style={{marginBottom:12,fontSize:12,color:”#475569”}}>Tap a theme to begin reading</div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10}}>
{UNITS.map(u=>{
const done=progress[u.id]||0;
return(
<div key={u.id} onClick={()=>onSelect(u)} style={{background:“linear-gradient(135deg,#080e1a,#0f172a)”,border:`1px solid ${u.color}25`,borderRadius:14,padding:“18px 16px”,cursor:“pointer”,transition:“border-color .18s”}} onMouseEnter={e=>e.currentTarget.style.borderColor=u.color+“70”} onMouseLeave={e=>e.currentTarget.style.borderColor=u.color+“25”}>
<div style={{fontSize:28,marginBottom:10}}>{u.icon}</div>
<div style={{fontSize:13,fontWeight:700,color:”#f1f5f9”,marginBottom:2}}>{u.title}</div>
<div style={{fontSize:11,color:”#475569”,fontFamily:“Noto Sans JP,sans-serif”,marginBottom:10}}>{u.titleJa}</div>
<div style={{display:“flex”,alignItems:“center”,gap:6}}>
<div style={{flex:1,height:3,background:”#1e293b”,borderRadius:2,overflow:“hidden”}}><div style={{height:“100%”,width:`${(done/8)*100}%`,background:u.color,borderRadius:2}}/></div>
<div style={{fontSize:10,color:”#475569”}}>{done}/8</div>
</div>
</div>
);
})}
</div>
</div>
);
}

function App(){
const [screen,setScreen]=useState(“dashboard”);
const [activeUnit,setActiveUnit]=useState(null);
const [passageIndex,setPassageIndex]=useState(0);
const [progress,setProgress]=useState({});
const [lexicon,setLexicon]=useState({});
const [wordsRead,setWordsRead]=useState(0);
const [showVocab,setShowVocab]=useState(false);
const handleSelectUnit=unit=>{setActiveUnit(unit);setScreen(“unit”);};
const handleStartPassage=idx=>{setPassageIndex(idx);setScreen(“reader”);};
const handlePassageComplete=()=>{
const next=passageIndex+1;
const wc=tokenise(PASSAGES[activeUnit.id][passageIndex].passage).filter(t=>t.type===“word”).length;
setWordsRead(w=>w+wc);
setProgress(p=>({…p,[activeUnit.id]:Math.max(p[activeUnit.id]||0,next)}));
if(next>=8)setScreen(“unit”);else setPassageIndex(next);
};
return(
<div style={{minHeight:“100vh”,background:”#030912”,color:”#f1f5f9”,fontFamily:“Inter,Noto Sans JP,sans-serif”}}>
<div style={{maxWidth:560,margin:“0 auto”,padding:“0 20px 64px”}}>
<div style={{paddingTop:36,paddingBottom:26}}>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”}}>
<div style={{display:“flex”,alignItems:“center”,gap:10,cursor:“pointer”}} onClick={()=>setScreen(“dashboard”)}>
<span style={{fontSize:22,fontFamily:“Noto Serif JP,serif”,color:”#818cf8”}}>読む</span>
<span style={{width:1,height:18,background:”#1e293b”}}/>
<span style={{fontSize:11,color:”#1e3a5f”,letterSpacing:3,textTransform:“uppercase”,fontWeight:600}}>YOMU N5</span>
</div>
<div style={{background:”#0f172a”,border:“1px solid #4f46e5”,borderRadius:8,padding:“5px 12px”,fontSize:11,color:”#6366f1”,fontWeight:700,letterSpacing:1}}>N5</div>
</div>
</div>
{screen===“dashboard”&&<Dashboard progress={progress} lexiconSize={Object.keys(lexicon).length} wordsRead={wordsRead} onSelect={handleSelectUnit} onShowVocab={()=>setShowVocab(true)}/>}
{screen===“unit”&&activeUnit&&<UnitScreen unit={activeUnit} progress={progress} onStart={handleStartPassage} onBack={()=>setScreen(“dashboard”)}/>}
{screen===“reader”&&activeUnit&&<PassageView unit={activeUnit} passage={PASSAGES[activeUnit.id][passageIndex]} passageIndex={passageIndex} lexicon={lexicon} setLexicon={setLexicon} onComplete={handlePassageComplete} onBack={()=>setScreen(“unit”)}/>}
</div>
{showVocab&&<VocabSidebar lexicon={lexicon} onClose={()=>setShowVocab(false)}/>}
</div>
);
}

const root=ReactDOM.createRoot(document.getElementById(“root”));
root.render(<App/>);
</script>

</body>
</html>
